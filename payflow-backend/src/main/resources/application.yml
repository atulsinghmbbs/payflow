# ─── Server ───────────────────────────────────────────────────────────────────
server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 100
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never   # Never expose stack traces in production

# ─── Database ─────────────────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

    # HikariCP - Connection Pool Tuning
    hikari:
      pool-name: PaymentHikariPool
      minimum-idle: 5
      maximum-pool-size: 20              # Max concurrent DB connections
      idle-timeout: 300000               # 5 minutes
      connection-timeout: 20000          # 20 seconds - fail fast
      max-lifetime: 1200000              # 20 minutes
      keepalive-time: 60000              # 1 minute
      leak-detection-threshold: 60000   # Warn on connections held > 1 min
      connection-test-query: SELECT 1
      # Crucial: isolation level for all connections
      transaction-isolation: TRANSACTION_READ_COMMITTED

  # ─── JPA / Hibernate ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update              # NEVER auto-create in prod; use migrations
    show-sql: false                   # Set true for debugging only
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50             # Batch inserts for performance
          fetch_size: 100
        order_inserts: true
        order_updates: true
        generate_statistics: false
        # Lock timeout: wait max 10 seconds for a lock before failing
        javax.persistence.lock.timeout: 10000
        query.plan_cache_max_size: 2048

  # ─── Flyway DB Migrations ─────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# ─── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.payment: INFO
    org.springframework.transaction: DEBUG   # Log transaction boundaries
    org.hibernate.SQL: DEBUG                 # Log SQL (dev only)
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

# ─── OpenAPI ──────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method